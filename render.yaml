services:
  - type: web
    name: uniagraria-recoleccion-facatativa-2026
    runtime: python
    repo: https://github.com/tu-usuario/uniagraria-nuevo
    plan: professional
    region: oregon
    branch: main
    buildCommand: |
      pip install -r requirements.txt
      python init_db_postgres.py
    startCommand: gunicorn app:app --workers 4 --threads 2 --timeout 120 --worker-class gthread --bind 0.0.0.0:$PORT
    healthCheckPath: /dashboard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uniagraria-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app.py
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_REDIRECT_URI
        sync: false

databases:
  - name: uniagraria-postgres
    plan: professional
    region: oregon
    databaseName: uniagraria_2026
    user: uniagraria_admin
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere